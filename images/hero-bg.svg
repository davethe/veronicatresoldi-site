<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8ab4a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#477560;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="1600" height="600"/>
  <!-- Decorative elements representing toys/childhood -->
  <circle cx="200" cy="450" r="60" fill="#f2dede" opacity="0.3"/>
  <circle cx="1400" cy="150" r="80" fill="#e8b5b5" opacity="0.3"/>
  <rect x="600" y="400" width="100" height="80" rx="10" fill="#f2dede" opacity="0.25" transform="rotate(-15 650 440)"/>
  <circle cx="900" cy="200" r="40" fill="#ffffff" opacity="0.15"/>
  <!-- Train toy silhouette -->
  <g transform="translate(1100, 480)" opacity="0.2">
    <rect x="0" y="0" width="120" height="60" rx="5" fill="#ffffff"/>
    <rect x="130" y="20" width="80" height="40" rx="5" fill="#ffffff"/>
    <circle cx="30" cy="70" r="15" fill="#ffffff"/>
    <circle cx="90" cy="70" r="15" fill="#ffffff"/>
    <circle cx="170" cy="70" r="15" fill="#ffffff"/>
  </g>
</svg>

