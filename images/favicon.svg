<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a9a7a"/>
      <stop offset="100%" style="stop-color:#3a6150"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7bc49a"/>
      <stop offset="100%" style="stop-color:#477560"/>
    </linearGradient>
  </defs>
  
  <!-- Circular background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  
  <!-- Decorative leaf/growth element -->
  <path d="M380 140 C350 180 320 160 300 200 C280 240 310 280 280 320 C250 360 200 340 180 380" 
        stroke="#f2dede" stroke-width="8" fill="none" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Letter V -->
  <path d="M120 150 L200 380 L280 150" 
        stroke="#ffffff" stroke-width="40" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Letter T -->
  <path d="M280 150 L420 150 M350 150 L350 380" 
        stroke="#ffffff" stroke-width="40" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Small decorative dot -->
  <circle cx="200" cy="420" r="20" fill="#f2dede" opacity="0.6"/>
  
  <!-- Subtle inner glow -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
</svg>

