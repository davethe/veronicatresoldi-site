<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3d2e"/>
      <stop offset="100%" style="stop-color:#2d4a3f"/>
    </linearGradient>
  </defs>
  
  <!-- Circular background - dark teal green dal logo -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  
  <!-- Light pink circle for initials - dal logo -->
  <circle cx="256" cy="256" r="140" fill="#e8b5b5"/>
  
  <!-- Letter V - dark gray dal logo -->
  <path d="M180 180 L220 300 L260 180" 
        stroke="#2d2d2d" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Letter T - dark gray dal logo -->
  <path d="M280 180 L380 180 M330 180 L330 300" 
        stroke="#2d2d2d" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
